name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
          additional_files: hooks
          severity: warning

      - name: Shell syntax check
        run: find scripts testing -type f -name "*.sh" -print0 | xargs -0 -n1 bash -n

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Install jq
        run: sudo apt-get install -y -qq jq

      - name: Run bats tests
        run: bats tests/

      - name: Verify init/todo contracts
        run: bash scripts/verify-init-todo.sh

      - name: Verify CLAUDE bootstrap contracts
        run: bash scripts/verify-claude-bootstrap.sh

      - name: Verify bash script contracts
        run: bash testing/verify-bash-scripts-contract.sh

      - name: Verify command contracts
        run: bash testing/verify-commands-contract.sh

  qa-review-check:
    name: QA Review Evidence
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for QA round commits
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get commits in this PR
          commits=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits" --paginate --jq '.[].commit.message')

          # Count commits matching: fix(something): address QA round N
          qa_count=$(echo "$commits" | grep -ciE '^fix\(.*\): address QA round [0-9]+' || true)

          echo "Found $qa_count QA round commit(s)"

          if [ "$qa_count" -lt 2 ]; then
            echo "::error::PR requires at least 2 QA round commits (fix(scope): address QA round N). Found $qa_count. See CONTRIBUTING.md for the QA review process."
            exit 1
          fi

          echo "QA review evidence verified ($qa_count rounds)"
